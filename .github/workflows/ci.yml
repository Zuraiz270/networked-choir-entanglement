name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (ffmpeg + opencv runtime)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ffmpeg libgl1 libglib2.0-0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.10.10"
          enable-cache: true

      - name: Pin Python
        run: uv python install 3.11.9

      - name: Verify lock matches pyproject
        run: uv lock --check

      - name: Sync (all extras, frozen)
        run: uv sync --frozen --all-extras

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy src tests

      - name: Pytest
        run: uv run pytest tests/ -v --cov=src/choir_entanglement --cov-report=term-missing
